<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Landing Page Builder | EFAP & BRASSART</title>
    
    <!-- GrapesJS Styles -->
    <link rel="stylesheet" href="https://unpkg.com/grapesjs/dist/css/grapes.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom UI Styles -->
    <link rel="stylesheet" href="css/builder.css">
    
    <!-- External Libraries -->
    <script src="https://unpkg.com/grapesjs"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>
    <div id="builder-container">
        <!-- Top Toolbar -->
        <header class="builder-toolbar">
            <div class="toolbar-left">
                <div class="app-logo">
                    <span class="logo-icon">▲</span>
                    <span class="logo-text">Builder<span class="text-accent">POC</span></span>
                </div>
                <div class="toolbar-divider"></div>
                <nav class="toolbar-menu">
                    <button class="menu-btn" id="btn-new">New</button>
                    <div class="dropdown">
                        <button class="menu-btn" id="btn-export">Export ▼</button>
                        <div class="dropdown-content">
                            <a href="#" id="export-html">HTML Template</a>
                            <a href="#" id="export-json">JSON Config</a>
                            <a href="#" id="export-zip">Production ZIP</a>
                        </div>
                    </div>
                </nav>
            </div>
            
            <div class="toolbar-center">
                <div class="device-switcher">
                    <button class="device-btn active" id="device-desktop" title="Desktop (Full)">
                        <svg viewBox="0 0 24 24"><path d="M21 2H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h7v2H8v2h8v-2h-2v-2h7c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H3V4h18v12z"/></svg>
                    </button>
                    <button class="device-btn" id="device-tablet" title="Tablet (600px)">
                        <svg viewBox="0 0 24 24"><path d="M18.5 0h-13C3.57 0 2 1.57 2 3.5v17C2 22.43 3.57 24 5.5 24h13c1.93 0 3.5-1.57 3.5-3.5v-17C22 1.57 20.43 0 18.5 0zM12 22c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm8-4H4V3.5C4 2.67 4.67 2 5.5 2h13c.83 0 1.5.67 1.5 1.5V18z"/></svg>
                    </button>
                    <button class="device-btn" id="device-mobile" title="Mobile (375px)">
                        <svg viewBox="0 0 24 24"><path d="M17 1.01L7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-2-2-2zm0 19H7V4h10v16z"/></svg>
                    </button>
                </div>
            </div>
            
            <div class="toolbar-right">
                <div class="history-btns">
                    <button class="toolbar-icon-btn" id="btn-undo" title="Undo">
                        <svg viewBox="0 0 24 24"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg>
                    </button>
                    <button class="toolbar-icon-btn" id="btn-redo" title="Redo">
                        <svg viewBox="0 0 24 24"><path d="M18.4 10.6C16.55 8.99 14.15 8 11.5 8c-4.65 0-8.58 3.03-9.96 7.22L3.9 16c1.05-3.19 4.05-5.5 7.6-5.5 1.95 0 3.73.72 5.12 1.88L13 16h9V7l-3.6 3.6z"/></svg>
                    </button>
                </div>
                <button class="btn-primary" id="btn-save">Save Project</button>
                <button class="btn-outline" id="btn-preview">Preview</button>
            </div>
        </header>

        <main class="builder-main">
            <!-- Left Sidebar -->
            <aside class="sidebar-left">
                <div class="sidebar-tabs">
                    <button class="tab-btn active" data-tab="blocks">Blocks</button>
                    <button class="tab-btn" data-tab="layers">Layers</button>
                </div>
                <div class="tab-content" id="blocks-panel">
                    <div class="search-box">
                        <input type="text" placeholder="Search blocks..." id="block-search">
                    </div>
                    <div id="blocks"></div>
                    <button class="btn-add-block" id="btn-create-block">+ New Block</button>
                </div>
                <div class="tab-content hidden" id="layers-panel">
                    <div id="layers-container"></div>
                </div>
            </aside>

            <!-- Canvas Area -->
            <section class="canvas-wrapper">
                <div id="gjs"></div>
            </section>

            <!-- Right Sidebar -->
            <aside class="sidebar-right">
                <div class="panel-section">
                    <div class="section-title">Styles & Properties</div>
                    <div id="styles-container"></div>
                </div>
                <div class="panel-section">
                    <div class="section-title">Traits</div>
                    <div id="traits-container"></div>
                </div>
            </aside>
        </main>
    </div>

    <!-- Modals -->
    <div id="modal-container" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Export Options</h3>
                <button class="close-modal">&times;</button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Dynamic content -->
            </div>
            <div class="modal-footer">
                <button class="btn-secondary close-modal">Close</button>
            </div>
        </div>
    </div>

    <!-- App Scripts -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
